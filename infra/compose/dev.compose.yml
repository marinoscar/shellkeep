# =============================================================================
# Docker Compose - Development Overrides
# =============================================================================
# Usage:
#   docker compose -f base.compose.yml -f dev.compose.yml up
#
# Provides development-specific settings: hot reload, exposed ports, volumes.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Nginx - Development overrides (use Vite port 5173)
  # ---------------------------------------------------------------------------
  nginx:
    volumes:
      - ../nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro

  # ---------------------------------------------------------------------------
  # API - Development overrides
  # ---------------------------------------------------------------------------
  api:
    build:
      target: development
    volumes:
      - ../../apps/api/src:/app/src:ro
      - ../../apps/api/test:/app/test:ro
      - ../../apps/api/prisma:/app/prisma:ro
    environment:
      - NODE_ENV=development
    command: npm run start:dev

  # ---------------------------------------------------------------------------
  # Web - Development overrides
  # ---------------------------------------------------------------------------
  web:
    build:
      target: development
    volumes:
      - ../../apps/web/src:/app/src:ro
    environment:
      - NODE_ENV=development
    command: npm run dev

