name: Android

on:
  push:
    branches: [main]
    paths:
      - 'apps/android/**'
      - '.github/workflows/android.yml'
    tags: ['android-v*']
  pull_request:
    branches: [main]
    paths:
      - 'apps/android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.10

      - name: Lint
        run: ./gradlew :app:lint --no-daemon

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: shellkeep-android-debug
          path: apps/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

  release:
    name: Sign & publish APK
    if: startsWith(github.ref, 'refs/tags/android-v')
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.10

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set."
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/keystore"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/keystore/release.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/keystore/release.jks" >> "$GITHUB_ENV"

      - name: Assemble signed release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Attach APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/android/app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: true
